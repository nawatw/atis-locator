<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearest ATIS Radar</title>
    <script src="wikipedia_airports.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
        }

        #header-panel {
            padding: 20px;
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
        }

        #header-panel h2 {
            margin: 0 0 10px 0;
            font-weight: 500;
        }

        #location-data {
            font-size: 1rem;
            color: #bdc3c7;
            margin-bottom: 15px;
        }

        #timer-display {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e74c3c;
            min-height: 24px;
        }

        #airport-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .airport-item {
            padding: 18px 20px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease;
        }

        .airport-item:last-child {
            border-bottom: none;
        }

        .airport-item:hover, .airport-item:active {
            background-color: #e2e6ea;
        }

        .icao-code {
            font-weight: bold;
            font-size: 1.2rem;
            color: #2980b9;
        }

        .distance {
            font-size: 1rem;
            color: #555;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="header-panel">
            <h2>ATIS Locator</h2>
            <div id="location-data"><span class="loader"></span> Detecting location...</div>
            <div id="timer-display"></div>
        </div>
        <ul id="airport-list"></ul>
    </div>

<script>
        let countdownInterval;

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1); 
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c; 
        }

        function deg2rad(deg) { return deg * (Math.PI/180); }

        async function getCityName(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
                if (response.ok) {
                    const data = await response.json();
                    return data.name || data.address.city || data.address.town || data.address.state || null;
                }
            } catch (e) {
                return null; 
            }
        }

        function redirect(icao, isAuto = false) {
            clearInterval(countdownInterval);
            document.getElementById('timer-display').innerText = "Redirecting...";

            if (isAuto) {
                // Flag the session to prevent auto-redirect loops when returning
                sessionStorage.setItem('autoRedirectComplete', 'true');
                // Push a state to the history stack to absorb the browser's replace action
                window.history.pushState(null, null, window.location.href);
            }

            window.location.href = `https://atis.guru/atis/${icao}`;
        }

        function startTimer(nearestIcao) {
            let timeLeft = 10;
            const timerDisplay = document.getElementById('timer-display');
            
            timerDisplay.innerText = `Auto-redirecting to ${nearestIcao} in ${timeLeft}s`;

            countdownInterval = setInterval(() => {
                timeLeft -= 1;
                if (timeLeft > 0) {
                    timerDisplay.innerText = `Auto-redirecting to ${nearestIcao} in ${timeLeft}s`;
                } else {
                    clearInterval(countdownInterval);
                    redirect(nearestIcao, true);
                }
            }, 1000);
        }

        function initializeApp() {
            const locationDiv = document.getElementById('location-data');
            const airportListUI = document.getElementById('airport-list');

            if (!navigator.geolocation) {
                locationDiv.innerText = "Geolocation not supported.";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;
                    
                    const cityName = await getCityName(userLat, userLon);
                    locationDiv.innerText = cityName ? cityName : `${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;

                    if (typeof airports === 'undefined') {
                        locationDiv.innerText = "Error: Database file missing.";
                        return;
                    }

                    let distanceArray = [];
                    for (const [icao, coords] of Object.entries(airports)) {
                        const distance = getDistanceFromLatLonInKm(userLat, userLon, coords.lat, coords.lon);
                        distanceArray.push({ icao: icao, distance: distance });
                    }
                    
                    distanceArray.sort((a, b) => a.distance - b.distance);
                    const top10 = distanceArray.slice(0, 10);
                    const nearestIcao = top10[0].icao;

                    airportListUI.innerHTML = ''; 
                    
                    top10.forEach((item) => {
                        const li = document.createElement('li');
                        li.className = 'airport-item';
                        
                        const distFormatted = item.distance < 100 ? item.distance.toFixed(1) : Math.round(item.distance);

                        li.innerHTML = `
                            <span class="icao-code">${item.icao}</span>
                            <span class="distance">${distFormatted} km</span>
                        `;
                        
                        // Manual clicks pass 'false' to the redirect function
                        li.onclick = () => redirect(item.icao, false);
                        airportListUI.appendChild(li);
                    });

                    // Check if the user arrived here via the Back button after an auto-redirect
                    if (sessionStorage.getItem('autoRedirectComplete')) {
                        const timerDisplay = document.getElementById('timer-display');
                        timerDisplay.innerText = "Auto-redirect paused. Select manually.";
                        timerDisplay.style.color = "#7f8c8d";
                    } else {
                        startTimer(nearestIcao);
                    }
                },
                (error) => {
                    locationDiv.innerText = "Location access denied.";
                },
                { enableHighAccuracy: false, timeout: 10000, maximumAge: 0 }
            );
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
